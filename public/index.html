<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片智能点评 Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>📷 照片智能点评 Pro</h1>
            <p class="subtitle">AI专业摄影点评，帮你提升摄影技巧</p>
        </header>

        <div id="upload-area" class="upload-area">
            <div class="upload-icon">📁</div>
            <h2>拖拽照片到这里</h2>
            <p>或者 <span class="upload-link">点击选择文件</span></p>
            <p class="upload-hint">支持 JPG、PNG、WebP 格式</p>
            <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" hidden>
        </div>

        <div id="progress-section" class="progress-section hidden">
            <div class="progress-header">
                <h3>AI分析中</h3>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p id="progress-status" class="progress-status">正在调用AI分析照片...</p>
        </div>

        <div id="results-section" class="results-section hidden">
            <div class="stats-bar">
                <div class="stats">
                    <span>已分析 <strong id="total-count">0</strong> 张</span>
                </div>
                <div class="actions">
                    <button id="btn-new-batch" class="btn btn-outline">🔄 继续分析</button>
                </div>
            </div>
            <div id="review-list" class="review-list"></div>
        </div>

        <div id="photo-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <button class="modal-close">&times;</button>
                <div class="modal-body">
                    <div class="modal-image">
                        <img id="modal-img" src="" alt="照片">
                    </div>
                    <div class="modal-info">
                        <h3 id="modal-filename">文件名</h3>
                        <div id="modal-review" class="modal-review"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
