<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片智能点评 Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .ai-review-box {
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 0.9rem;
        }
        .ai-review-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--accent);
        }
        .btn-analyze-ai {
            background: linear-gradient(135deg, #4a9eff, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
        }
        .btn-analyze-ai:hover {
            opacity: 0.9;
        }
        .btn-analyze-ai:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 头部 -->
        <header class="header">
            <h1>📷 照片智能点评 Pro</h1>
            <p class="subtitle">AI专业摄影点评，帮你提升摄影技巧</p>
        </header>

        <!-- 上传区域 -->
        <div id="upload-area" class="upload-area">
            <div class="upload-icon">📁</div>
            <h2>拖拽照片到这里</h2>
            <p>或者 <span class="upload-link">点击选择文件</span></p>
            <p class="upload-hint">支持 JPG、PNG、WebP 格式，建议单张上传获得最佳点评</p>
            <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" hidden>
        </div>

        <!-- 分析进度 -->
        <div id="progress-section" class="progress-section hidden">
            <div class="progress-header">
                <h3 id="progress-title">AI分析中</h3>
                <span id="progress-text"></span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p id="progress-status" class="progress-status">正在调用AI分析照片内容...</p>
        </div>

        <!-- 点评结果 -->
        <div id="results-section" class="results-section hidden">
            <div class="stats-bar">
                <div class="stats">
                    <span>已分析 <strong id="total-count">0</strong> 张</span>
                </div>
                <div class="actions">
                    <button id="btn-new-batch" class="btn btn-outline">🔄 继续分析</button>
                </div>
            </div>

            <!-- 点评列表 -->
            <div id="review-list" class="review-list"></div>
        </div>

        <!-- 照片详情弹窗 -->
        <div id="photo-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <button class="modal-close">&times;</button>
                <div class="modal-body">
                    <div class="modal-image">
                        <img id="modal-img" src="" alt="照片">
                    </div>
                    <div class="modal-info">
                        <h3 id="modal-filename">文件名</h3>
                        <div id="modal-review" class="modal-review"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app-pro.js"></script>
</body>
</html>
